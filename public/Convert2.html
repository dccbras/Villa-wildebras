<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AFAS Iconen Zoeken</title>
<style>

    body {

      font-family: sans-serif;

      background-color: #f8f9fa;

      color: #333;

      padding: 2rem;

    }

    input {

      padding: 10px;

      width: 300px;

      border: 1px solid #ccc;

      border-radius: 6px;

      margin-bottom: 20px;

    }

    .icons-grid {

      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));

      gap: 1.5rem;

    }

    .icon-card {

      background: #fff;

      padding: 1rem;

      border-radius: 12px;

      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

      text-align: center;

      transition: transform 0.2s;

    }

    .icon-card:hover {

      transform: translateY(-3px);

    }

    .icon-card img {

      width: 64px;

      height: 64px;

      object-fit: contain;

      margin-bottom: 0.5rem;

    }
</style>
</head>
<body>
<h1>🔍 AFAS Iconen Zoeken</h1>
<input type="text" id="search" placeholder="Typ om te zoeken..." />
 
  <div class="icons-grid" id="iconsGrid"></div>
 
  <script>

    // Voeg hier je iconen toe

    const icons = [

      { name: "Boekingsmatrix", file: "BOEKINGSMATRIX.png" },

      { name: "Controleren", file: "CONTROLEREN.png" },

      { name: "Fixed Price", file: "FIXED PRICE.png" },

      { name: "Geaccordeerde Uren", file: "Geaccordeerde uren.png" },

      { name: "MW Uren Boeken", file: "MW UREN BOEKEN.png" },

      { name: "Aan Team Deelnemen", file: "AAN TEAM DEELNEMEN.png" },

      { name: "Abonnementen", file: "Abonnementen.png" },

      { name: "Accorderen Beoordelen", file: "ACCORDEREN BEOORDELEN.png" },

      { name: "Agekeurde Uren", file: "AGEKEURDE UREN.png" }

    ];
 
    const grid = document.getElementById("iconsGrid");

    const search = document.getElementById("search");
 
    function renderIcons(filter = "") {

      grid.innerHTML = "";

      const filtered = icons.filter(icon =>

        icon.name.toLowerCase().includes(filter.toLowerCase())

      );

      filtered.forEach(icon => {

        const card = document.createElement("div");

        card.classList.add("icon-card");
 
        // ✅ Directe verwijzing naar /public (nu gewoon /)

        const img = document.createElement("img");

        img.src = `${window.location.origin}/${icon.file}`;

        img.alt = icon.name;
 
        const label = document.createElement("div");

        label.textContent = icon.name;
 
        card.appendChild(img);

        card.appendChild(label);

        grid.appendChild(card);

      });

    }
 
    search.addEventListener("input", (e) => renderIcons(e.target.value));

    renderIcons();
</script>
</body>
</html>
