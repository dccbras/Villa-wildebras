<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AFAS Iconen Zoeken</title>
<style>

    body {

      font-family: sans-serif;

      background-color: #f8f9fa;

      color: #333;

      padding: 2rem;

    }

    input {

      padding: 10px;

      width: 320px;

      border: 1px solid #ccc;

      border-radius: 6px;

      margin-bottom: 20px;

    }

    .icons-grid {

      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));

      gap: 1.5rem;

    }

    .icon-card {

      background: #fff;

      padding: 1rem;

      border-radius: 12px;

      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

      text-align: center;

      transition: transform 0.2s;

    }

    .icon-card:hover {

      transform: translateY(-3px);

    }

    .icon-card img {

      width: 64px;

      height: 64px;

      object-fit: contain;

      margin-bottom: 0.5rem;

    }

    .no-results {

      text-align: center;

      margin-top: 2rem;

      color: #888;

    }
</style>
</head>
<body>
<h1>🔍 AFAS Iconen Zoeken</h1>
<input type="text" id="search" placeholder="Typ om te zoeken..." />
 
  <div class="icons-grid" id="iconsGrid"></div>
<div class="no-results" id="noResults" style="display:none;">Geen iconen gevonden...</div>
 
  <script>

    // ✅ Iconen met synoniemen

    const icons = [

      { name: "Boekingsmatrix", file: "BOEKINGSMATRIX.png", synonyms: ["planning", "overzicht", "schema"] },

      { name: "Controleren", file: "CONTROLEREN.png", synonyms: ["nakijken", "verifiëren", "checken"] },

      { name: "Fixed Price", file: "FIXED PRICE.png", synonyms: ["vaste prijs", "budget", "tarief"] },

      { name: "Geaccordeerde Uren", file: "Geaccordeerde uren.png", synonyms: ["goedgekeurde uren", "uren akkoord", "tijd registratie"] },

      { name: "MW Uren Boeken", file: "MW UREN BOEKEN.png", synonyms: ["medewerker", "personeel", "tijd boeken", "werknemer", "collega"] },

      { name: "Aan Team Deelnemen", file: "AAN TEAM DEELNEMEN.png", synonyms: ["team", "teams", "groep", "collega's", "samenwerken"] },

      { name: "Abonnementen", file: "Abonnementen.png", synonyms: ["lidmaatschap", "contract", "inschrijving"] },

      { name: "Accorderen Beoordelen", file: "ACCORDEREN BEOORDELEN.png", synonyms: ["goedkeuren", "controleren", "reviewen", "beoordeling", "acorderen"] },

      { name: "Agekeurde Uren", file: "AGEKEURDE UREN.png", synonyms: ["geaccepteerde uren", "uren akkoord", "goedgekeurd"] }

    ];
 
    const grid = document.getElementById("iconsGrid");

    const search = document.getElementById("search");

    const noResults = document.getElementById("noResults");
 
    // 🧠 Tekst-normalisatie (verwijdert accenten, leestekens, meervoudsvormen)

    function normalizeText(text) {

      return text

        .toLowerCase()

        .normalize("NFD")

        .replace(/[\u0300-\u036f]/g, "")

        .replace(/[^a-z0-9 ]/g, "")

        .replace(/\s+/g, " ")

        .trim()

        .replace(/(en|e|s|n|er|ers|tje|tjes)\b/g, "");

    }
 
    // 🔠 Levenshtein-afstand berekening

    function levenshtein(a, b) {

      const matrix = Array.from({ length: a.length + 1 }, (_, i) =>

        Array(b.length + 1).fill(0)

      );

      for (let i = 0; i <= a.length; i++) matrix[i][0] = i;

      for (let j = 0; j <= b.length; j++) matrix[0][j] = j;

      for (let i = 1; i <= a.length; i++) {

        for (let j = 1; j <= b.length; j++) {

          const cost = a[i - 1] === b[j - 1] ? 0 : 1;

          matrix[i][j] = Math.min(

            matrix[i - 1][j] + 1, // verwijderen

            matrix[i][j - 1] + 1, // invoegen

            matrix[i - 1][j - 1] + cost // vervangen

          );

        }

      }

      return matrix[a.length][b.length];

    }
 
    // ✅ Check of de zoekterm 'dichtbij genoeg' is (max 2 verschil)

    function fuzzyMatch(term, query) {

      const t = normalizeText(term);

      const q = normalizeText(query);

      if (t.includes(q)) return true;

      return levenshtein(t, q) <= 2;

    }
 
    // 🔍 Hoofdzoekfunctie

    function matchesQuery(icon, query) {

      const combined = [icon.name, ...(icon.synonyms || [])].join(" ");

      const words = combined.split(" ");

      return words.some(word => fuzzyMatch(word, query));

    }
 
    function renderIcons(filter = "") {

      grid.innerHTML = "";

      filter = filter.trim();
 
      const filtered = icons.filter(icon => {

        if (!filter) return true;

        return matchesQuery(icon, filter);

      });
 
      noResults.style.display = filtered.length === 0 ? "block" : "none";
 
      filtered.forEach(icon => {

        const card = document.createElement("div");

        card.classList.add("icon-card");
 
        const img = document.createElement("img");

        img.src = `${window.location.origin}/${icon.file}`;

        img.alt = icon.name;

        img.onerror = () => {

          img.style.display = "none";

          card.innerHTML += `<div style='color:#999;'>❌ Niet gevonden</div>`;

        };
 
        const label = document.createElement("div");

        label.textContent = icon.name;
 
        card.appendChild(img);

        card.appendChild(label);

        grid.appendChild(card);

      });

    }
 
    search.addEventListener("input", (e) => renderIcons(e.target.value));

    renderIcons();
</script>
</body>
</html>
