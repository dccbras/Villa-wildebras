<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Banner Converters</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background:#fafafa; }
  h2 { margin-top:40px; }
  .converter { background:#fff; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); padding:20px; margin-bottom:40px; }
  canvas { display:none; }
  .color-block { display:flex; align-items:center; gap:10px; margin:8px 0; }
  .color-display { width:32px; height:32px; border-radius:4px; border:1px solid #ccc; }
  input[type=color] { width:60px; height:32px; padding:0; border:none; cursor:pointer; }
  input[type=text] { padding:5px; width:90px; text-transform:uppercase; }
  button { margin:8px 8px 0 0; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; background:#007bff; color:#fff; }
  button:hover { background:#005ec2; }
  .preview { margin-top:10px; max-width:100%; border-radius:8px; border:1px solid #ccc; }
  .dropzone { margin-top:8px; padding:40px; border:2px dashed #999; border-radius:10px; text-align:center; color:#666; cursor:pointer; transition:.3s; }
  .dropzone.dragover { background:#eef7ff; border-color:#007bff; color:#007bff; }
</style>
</head>
<body>

<h1>Banner Converters</h1>

<!-- ===== Converter 1 ===== -->
<div class="converter">
  <h2>Converter 1 – Tekstbanner</h2>
  <input id="textInputA" placeholder="Voer tekst in" />
  <button id="previewBannerA">Preview</button>
  <button id="generateBannerA">Download</button>
  <canvas id="bannerCanvasA" width="2480" height="585"></canvas>
  <div id="previewDivA"></div>
</div>

<!-- ===== Converter 2 ===== -->
<div class="converter">
  <h2>Converter 2 – Kleurbanen</h2>
  <div class="color-block">
    <label>Kleur 1:</label>
    <input type="color" id="color1b" value="#ff0000" />
    <input type="text" id="color1bHex" value="#ff0000" maxlength="7" />
    <div id="display1b" class="color-display" style="background:#ff0000;"></div>
  </div>
  <div class="color-block">
    <label>Kleur 2:</label>
    <input type="color" id="color2b" value="#0000ff" />
    <input type="text" id="color2bHex" value="#0000ff" maxlength="7" />
    <div id="display2b" class="color-display" style="background:#0000ff;"></div>
  </div>
  <button id="previewBannerB">Preview</button>
  <button id="generateBannerB">Download</button>
  <canvas id="bannerCanvasB" width="2480" height="175"></canvas>
  <div id="previewDivB"></div>
</div>

<!-- ===== Converter 3 ===== -->
<div class="converter">
  <h2>Converter 3 – Banner met afbeelding</h2>
  <div class="color-block">
    <label>Kleur 1:</label>
    <input type="color" id="color1c" value="#ff0000" />
    <input type="text" id="color1cHex" value="#ff0000" maxlength="7" />
    <div id="display1c" class="color-display" style="background:#ff0000;"></div>
  </div>
  <div class="color-block">
    <label>Kleur 2:</label>
    <input type="color" id="color2c" value="#0000ff" />
    <input type="text" id="color2cHex" value="#0000ff" maxlength="7" />
    <div id="display2c" class="color-display" style="background:#0000ff;"></div>
  </div>

  <div id="dropC" class="dropzone">Klik of sleep een afbeelding hierheen</div>
  <input type="file" id="imageUploadC" accept="image/*" style="display:none;" />
  <input id="textInputC" placeholder="(optionele tekst)" />
  <button id="previewBannerC">Preview</button>
  <button id="generateBannerC">Download</button>
  <canvas id="bannerCanvasC" width="2480" height="585"></canvas>
  <div id="previewDivC"></div>
</div>

<script>
function normalizeHex(v){ return /^#/.test(v)?v:'#'+v; }

function syncColor(colorEl, hexEl, displayEl){
  const update = val => { displayEl.style.background=val; colorEl.value=val; hexEl.value=val.toUpperCase(); };
  colorEl.addEventListener('input', e => update(e.target.value));
  hexEl.addEventListener('input', e => { let v=normalizeHex(e.target.value); update(v); });
}

/* ===== Converter 1 ===== */
(() => {
  const canvas=document.getElementById('bannerCanvasA'), ctx=canvas.getContext('2d');
  const text=document.getElementById('textInputA'), prev=document.getElementById('previewBannerA');
  const gen=document.getElementById('generateBannerA'), prevDiv=document.getElementById('previewDivA');
  const W=2480,H=585;
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#000'; ctx.font='bold 72px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text.value||'Voorbeeldtekst',W/2,H/2);
    return canvas.toDataURL('image/png');
  }
  prev.onclick=()=>{const d=draw();prevDiv.innerHTML='';const i=new Image();i.src=d;i.className='preview';prevDiv.appendChild(i);};
  gen.onclick=()=>{const d=draw();const a=document.createElement('a');a.href=d;a.download='banner1.png';a.click();};
})();

/* ===== Converter 2 ===== */
(() => {
  const c=document.getElementById('bannerCanvasB'),x=c.getContext('2d');
  const color1=document.getElementById('color1b'),color2=document.getElementById('color2b');
  const color1Hex=document.getElementById('color1bHex'),color2Hex=document.getElementById('color2bHex');
  const disp1=document.getElementById('display1b'),disp2=document.getElementById('display2b');
  const prev=document.getElementById('previewBannerB'),gen=document.getElementById('generateBannerB'),prevDiv=document.getElementById('previewDivB');
  syncColor(color1,color1Hex,disp1); syncColor(color2,color2Hex,disp2);
  function draw(){
    const W=2480,H=175; x.clearRect(0,0,W,H);
    x.fillStyle='#ffffff'; x.fillRect(0,0,W,100);
    x.fillStyle=normalizeHex(color1.value); x.fillRect(0,100,W,50);
    x.fillStyle=normalizeHex(color2.value); x.fillRect(0,150,W,25);
    return c.toDataURL('image/png');
  }
  prev.onclick=()=>{const d=draw();prevDiv.innerHTML='';const i=new Image();i.src=d;i.className='preview';prevDiv.appendChild(i);};
  gen.onclick=()=>{const d=draw();const a=document.createElement('a');a.href=d;a.download='banner-2480x175.png';a.click();};
})();

/* ===== Converter 3 ===== */
(() => {
  const canvasC=document.getElementById('bannerCanvasC'),ctxC=canvasC.getContext('2d');
  const color1c=document.getElementById('color1c'),color2c=document.getElementById('color2c');
  const color1cHex=document.getElementById('color1cHex'),color2cHex=document.getElementById('color2cHex');
  const display1c=document.getElementById('display1c'),display2c=document.getElementById('display2c');
  const imageInputC=document.getElementById('imageUploadC'),textInputC=document.getElementById('textInputC');
  const previewBtnC=document.getElementById('previewBannerC'),genBtnC=document.getElementById('generateBannerC');
  const previewDivC=document.getElementById('previewDivC'),dropC=document.getElementById('dropC');
  let currentImageC=null;
  syncColor(color1c,color1cHex,display1c); syncColor(color2c,color2cHex,display2c);

  dropC.addEventListener('click',()=>imageInputC.click());
  dropC.addEventListener('dragover',e=>{e.preventDefault();dropC.classList.add('dragover');});
  dropC.addEventListener('dragleave',()=>dropC.classList.remove('dragover'));
  dropC.addEventListener('drop',e=>{e.preventDefault();dropC.classList.remove('dragover');handleFile(e.dataTransfer.files[0]);});
  imageInputC.addEventListener('change',e=>handleFile(e.target.files[0]));

  function handleFile(file){
    if(!file) return;
    const img=new Image();
    img.onload=()=>{currentImageC=img;};
    img.src=URL.createObjectURL(file);
  }

  function drawBannerC(img){
    const W=2480,H=585; ctxC.clearRect(0,0,W,H);
    ctxC.fillStyle='#ffffff'; ctxC.fillRect(0,0,W,100);
    ctxC.fillStyle=normalizeHex(color1c.value); ctxC.fillRect(0,100,W,50);
    ctxC.fillStyle=normalizeHex(color2c.value); ctxC.fillRect(0,150,W,25);

    const imgY=175, imgW=1600, imgH=410, imgX=(W-imgW)/2;
    if(img){
      const scale=Math.max(imgW/img.width,imgH/img.height);
      const drawW=img.width*scale, drawH=img.height*scale;
      const sx=(drawW>imgW)?(drawW-imgW)/(2*scale):0;
      const sy=(drawH>imgH)?(drawH-imgH)/(2*scale):0;
      const sW=img.width-2*sx, sH=img.height-2*sy;
      ctxC.drawImage(img,sx,sy,sW,sH,imgX,imgY,imgW,imgH);
    }else if(textInputC.value.trim()!==''){
      ctxC.fillStyle='#000'; ctxC.font='bold 48px Arial'; ctxC.textAlign='center'; ctxC.textBaseline='middle';
      ctxC.fillText(textInputC.value,W/2,imgY+imgH/2);
    }
    return canvasC.toDataURL('image/png');
  }

  previewBtnC.addEventListener('click',()=>{
    if(!currentImageC && textInputC.value.trim()===''){alert('Upload een afbeelding of tekst');return;}
    const d=drawBannerC(currentImageC);
    previewDivC.innerHTML=''; const img=new Image(); img.src=d; img.className='preview'; previewDivC.appendChild(img);
  });

  genBtnC.addEventListener('click',()=>{
    if(!currentImageC && textInputC.value.trim()===''){alert('Upload een afbeelding of tekst');return;}
    const d=drawBannerC(currentImageC);
    const a=document.createElement('a'); a.href=d; a.download='banner-2480x585.png'; a.click();
  });
})();
</script>

</body>
</html>
